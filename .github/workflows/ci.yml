name: CI

on:
  pull_request:
  push:

jobs:
  TestLintBuild:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6

      - name: Install dependencies
        run: make deps

      - name: Test
        run: make test

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          if-no-files-found: error
