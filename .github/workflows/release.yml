# To make a release first create a release by hand on GitHub. This workflow will
# run automatically to add the bookmarklet dist files to the release you
# created. It will also append the javascript code block to the end of the
# release notes.

name: Release

on:
  release:
    types:
      - published

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
      - name: Install dependencies
        run: make deps
      - name: Build
        run: make build
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          if-no-files-found: error

  Release:
    needs: Build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
      - name: Upload artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" ./bookmarklet.js ./bookmarklet.html
      - name: Build notes to append
        env:
          TEMPLATE: |
            ## Bookmarklet
            ```javascript
            $bookmarklet_js
            ```
        run: printenv TEMPLATE |bookmarklet_js="$(head -1 bookmarklet.js)" envsubst '$bookmarklet_js' |tee append_notes.txt
      - name: Append bookmarklet to release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          gh release view "${{ github.ref_name }}" --json body -q .body > new_notes.txt
          echo >> new_notes.txt
          cat append_notes.txt >> new_notes.txt
          cat new_notes.txt
          gh release edit "${{ github.ref_name }}" --notes-file new_notes.txt
